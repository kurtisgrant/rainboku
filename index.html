<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Rainboku</title>
  <link rel="stylesheet" href="./src/styles.css" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MJ2B5PM3TQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "G-MJ2B5PM3TQ");
  </script>
</head>
<body>
  <svg class="icon-sprite" aria-hidden="true" focusable="false">
    <symbol id="icon-calendar" viewBox="0 0 24 24">
      <path d="M8 2v4M16 2v4M4 9h16M6 4h12a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" />
      <path d="M8 13h.01M12 13h.01M16 13h.01M8 17h.01M12 17h.01" />
    </symbol>
    <symbol id="icon-flame" viewBox="0 0 24 24">
      <path d="M8.5 14.5c0-2.8 2.3-4.4 2.1-7.7 2.7 1.4 5.1 4.1 5.1 7.7 0 3.1-2 5.5-4.6 5.5-2.2 0-3.8-1.8-3.8-4.1 0-1.2.5-2.4 1.2-3.2v1.8Z" />
      <path d="M12.6 20c2.5-.7 4.4-2.9 4.4-6.2 0-2.1-.8-4.3-2.8-6.2C13.3 4.9 11.7 3 9.5 2c.7 3.7-3.5 5.7-3.5 10.4 0 4 2.7 7.1 6.6 7.6Z" />
    </symbol>
    <symbol id="icon-trophy" viewBox="0 0 24 24">
      <path d="M8 4h8v5a4 4 0 0 1-8 0V4Z" />
      <path d="M8 6H5a2 2 0 0 0 0 4h3M16 6h3a2 2 0 0 1 0 4h-3M12 13v5M9 22h6M10 18h4" />
    </symbol>
    <symbol id="icon-star" viewBox="0 0 24 24">
      <path d="m12 3 2.7 5.5 6.1.9-4.4 4.3 1 6.1L12 17l-5.4 2.8 1-6.1-4.4-4.3 6.1-.9L12 3Z" />
    </symbol>
    <symbol id="icon-leaf" viewBox="0 0 24 24">
      <path d="M20 4C12 4 5 9.5 5 17a4 4 0 0 0 4 4c7.5 0 11-8.3 11-17Z" />
      <path d="M5 21c3.4-5.5 7.2-8.7 12-11" />
    </symbol>
    <symbol id="icon-scale" viewBox="0 0 24 24">
      <path d="M12 3v18M6 7h12M7 7l-4 7h8L7 7ZM17 7l-4 7h8l-4-7ZM9 21h6" />
    </symbol>
    <symbol id="icon-gem" viewBox="0 0 24 24">
      <path d="M6 3h12l4 6-10 12L2 9l4-6Z" />
      <path d="M2 9h20M8 3l-2 6 6 12 6-12-2-6" />
    </symbol>
    <symbol id="icon-chevron-right" viewBox="0 0 24 24">
      <path d="m9 5 7 7-7 7" />
    </symbol>
  </svg>
  <main class="app" aria-labelledby="game-title">
    <header class="topbar">
      <h1 id="game-title">Rainbo<span>ku</span></h1>
      <button class="ghost-button" id="menuButton" type="button" hidden>Today</button>
    </header>

    <section class="screen start-screen" id="dashboardScreen" aria-label="Daily Rainboku dashboard">
      <div class="daily-card">
        <span class="date-icon" aria-hidden="true">
          <svg><use href="#icon-calendar"></use></svg>
        </span>
        <span class="date-copy">
          <span class="eyebrow">Daily puzzle</span>
          <strong id="dateLabel">Today</strong>
        </span>
      </div>

      <div class="stats-grid" aria-label="Stats">
        <div class="stat">
          <span class="stat-icon streak-icon" aria-hidden="true">
            <svg><use href="#icon-flame"></use></svg>
          </span>
          <span id="currentStreak">0</span>
          <small>Streak</small>
        </div>
        <div class="stat">
          <span class="stat-icon record-icon" aria-hidden="true">
            <svg><use href="#icon-trophy"></use></svg>
          </span>
          <span id="bestStreak">0</span>
          <small>Record</small>
        </div>
        <div class="stat">
          <span class="stat-icon solved-icon" aria-hidden="true">
            <svg><use href="#icon-star"></use></svg>
          </span>
          <span id="totalSolved">0</span>
          <small>Solved</small>
        </div>
      </div>

      <div class="difficulty-list" id="difficultyList">
        <button class="difficulty-button" type="button" data-difficulty="easy">
          <span class="difficulty-content">
            <span class="difficulty-art" aria-hidden="true">
              <span class="difficulty-badge">
                <svg><use href="#icon-leaf"></use></svg>
              </span>
            </span>
            <span class="difficulty-main">
              <span class="difficulty-name">Easy</span>
              <span class="difficulty-meta" data-status-for="easy">Not started</span>
              <span class="difficulty-history" data-dots-for="easy" aria-label="Easy solved days"></span>
            </span>
            <span class="difficulty-arrow" aria-hidden="true">
              <svg><use href="#icon-chevron-right"></use></svg>
            </span>
          </span>
        </button>
        <button class="difficulty-button" type="button" data-difficulty="medium">
          <span class="difficulty-content">
            <span class="difficulty-art" aria-hidden="true">
              <span class="difficulty-badge">
                <svg><use href="#icon-scale"></use></svg>
              </span>
            </span>
            <span class="difficulty-main">
              <span class="difficulty-name">Medium</span>
              <span class="difficulty-meta" data-status-for="medium">Not started</span>
              <span class="difficulty-history" data-dots-for="medium" aria-label="Medium solved days"></span>
            </span>
            <span class="difficulty-arrow" aria-hidden="true">
              <svg><use href="#icon-chevron-right"></use></svg>
            </span>
          </span>
        </button>
        <button class="difficulty-button" type="button" data-difficulty="hard">
          <span class="difficulty-content">
            <span class="difficulty-art" aria-hidden="true">
              <span class="difficulty-badge">
                <svg><use href="#icon-gem"></use></svg>
              </span>
            </span>
            <span class="difficulty-main">
              <span class="difficulty-name">Hard</span>
              <span class="difficulty-meta" data-status-for="hard">Not started</span>
              <span class="difficulty-history" data-dots-for="hard" aria-label="Hard solved days"></span>
            </span>
            <span class="difficulty-arrow" aria-hidden="true">
              <svg><use href="#icon-chevron-right"></use></svg>
            </span>
          </span>
        </button>
      </div>
    </section>

    <section class="screen game-screen" id="gameScreen" hidden>
      <div class="game-meta">
        <span id="difficultyLabel">Easy</span>
        <span class="status" id="statusText" aria-live="polite"></span>
      </div>
      <div class="name-reel" aria-label="Colour name reel">
        <div class="reel-strip" id="reelStrip"></div>
      </div>
      <div class="play-pad" id="playPad">
        <div class="board-frame">
          <div class="board" id="board" role="grid" aria-label="Rainboku board"></div>
        </div>
      </div>
      <div class="action-row">
        <button class="ghost-button subtle" id="resetButton" type="button">Reset</button>
        <label class="label-toggle">
          <input id="labelColoursToggle" type="checkbox" />
          <span id="labelColoursText">Label Colours</span>
        </label>
        <button class="ghost-button subtle" id="shareButton" type="button" hidden>Share</button>
      </div>
    </section>
  </main>

  <div class="wheel" id="colourWheel" aria-hidden="true">
    <div class="wheel-hub" aria-hidden="true"></div>
  </div>

  <div class="modal-backdrop" id="resetModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="resetTitle">
      <h2 id="resetTitle">Reset puzzle?</h2>
      <p>This clears today's progress for this difficulty.</p>
      <div class="modal-actions">
        <button class="ghost-button subtle" id="cancelResetButton" type="button">Cancel</button>
        <button class="ghost-button danger" id="confirmResetButton" type="button">Reset</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="shareModal" hidden>
    <div class="modal share-modal" role="dialog" aria-modal="true" aria-labelledby="shareTitle">
      <h2 id="shareTitle">Result copied</h2>
      <p id="shareStatus">Copied to clipboard.</p>
      <pre id="sharePreview" class="share-preview"></pre>
      <div class="modal-actions">
        <button class="ghost-button subtle" id="closeShareButton" type="button">Close</button>
      </div>
    </div>
  </div>

  <canvas class="confetti" id="confettiCanvas" aria-hidden="true"></canvas>
  <script type="module" src="./src/app.js"></script>
</body>
</html>

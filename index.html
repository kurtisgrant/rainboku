<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Rainboku</title>
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <main class="app" aria-labelledby="game-title">
    <header class="topbar">
      <h1 id="game-title">Rainboku</h1>
      <button class="ghost-button" id="menuButton" type="button" hidden>Today</button>
    </header>

    <section class="screen start-screen" id="dashboardScreen" aria-label="Daily Rainboku dashboard">
      <div class="daily-card">
        <span class="eyebrow">Daily puzzle</span>
        <strong id="dateLabel">Today</strong>
      </div>

      <div class="stats-grid" aria-label="Stats">
        <div class="stat">
          <span id="currentStreak">0</span>
          <small>Streak</small>
        </div>
        <div class="stat">
          <span id="bestStreak">0</span>
          <small>Record</small>
        </div>
        <div class="stat">
          <span id="totalSolved">0</span>
          <small>Solved</small>
        </div>
      </div>

      <div class="difficulty-list" id="difficultyList">
        <button class="difficulty-button" type="button" data-difficulty="easy">
          <span class="difficulty-content">
            <span class="difficulty-main">
              <span class="difficulty-name">Easy</span>
              <span class="difficulty-meta" data-status-for="easy">Not started</span>
              <span class="difficulty-history" data-dots-for="easy" aria-label="Easy solved days"></span>
            </span>
            <span class="difficulty-emblem" aria-hidden="true"></span>
          </span>
        </button>
        <button class="difficulty-button" type="button" data-difficulty="medium">
          <span class="difficulty-content">
            <span class="difficulty-main">
              <span class="difficulty-name">Medium</span>
              <span class="difficulty-meta" data-status-for="medium">Not started</span>
              <span class="difficulty-history" data-dots-for="medium" aria-label="Medium solved days"></span>
            </span>
            <span class="difficulty-emblem" aria-hidden="true"></span>
          </span>
        </button>
        <button class="difficulty-button" type="button" data-difficulty="hard">
          <span class="difficulty-content">
            <span class="difficulty-main">
              <span class="difficulty-name">Hard</span>
              <span class="difficulty-meta" data-status-for="hard">Not started</span>
              <span class="difficulty-history" data-dots-for="hard" aria-label="Hard solved days"></span>
            </span>
            <span class="difficulty-emblem" aria-hidden="true"></span>
          </span>
        </button>
      </div>
    </section>

    <section class="screen game-screen" id="gameScreen" hidden>
      <div class="game-meta">
        <span id="difficultyLabel">Easy</span>
        <span class="status" id="statusText" aria-live="polite"></span>
      </div>
      <div class="name-reel" aria-label="Colour name reel">
        <div class="reel-strip" id="reelStrip"></div>
      </div>
      <div class="play-pad" id="playPad">
        <div class="board-frame">
          <div class="board" id="board" role="grid" aria-label="Rainboku board"></div>
        </div>
      </div>
      <div class="action-row">
        <button class="ghost-button subtle" id="resetButton" type="button">Reset</button>
        <button class="ghost-button subtle" id="shareButton" type="button" hidden>Share</button>
      </div>
    </section>
  </main>

  <div class="wheel" id="colourWheel" aria-hidden="true">
    <div class="wheel-hub" aria-hidden="true"></div>
  </div>

  <div class="modal-backdrop" id="resetModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="resetTitle">
      <h2 id="resetTitle">Reset puzzle?</h2>
      <p>This clears today's progress for this difficulty.</p>
      <div class="modal-actions">
        <button class="ghost-button subtle" id="cancelResetButton" type="button">Cancel</button>
        <button class="ghost-button danger" id="confirmResetButton" type="button">Reset</button>
      </div>
    </div>
  </div>

  <canvas class="confetti" id="confettiCanvas" aria-hidden="true"></canvas>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
